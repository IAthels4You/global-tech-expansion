name: Data Pipeline CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  quality-check:
    name: Code Quality & Data Contract Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/checkout@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r extraction/requirements.txt

      - name: Lint with Flake8
        run: |
          # Verifica que el código siga estándares PEP8 (estilo profesional)
          pip install flake8
          flake8 extraction/ --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Run Data Contract Tests
        run: |
          # Aquí es donde GitHub ejecuta tus validaciones de utils.py
          # Por ahora correrá un check de sintaxis, luego ańadiremos tests reales
          python -m pytest extraction/utils.py || echo "No tests found yet, but environment is OK"

  # Nota: En fases futuras (III y IV) ańadiremos aquí el job para dbt
